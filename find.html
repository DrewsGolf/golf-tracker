<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a6b3a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>Find a Course</title>
<script src="courses.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --green-dark: #1a6b3a; --green-mid: #2d8a52; --green-light: #e8f5ed; --green-pale: #f2faf5;
    --text-primary: #1a1a1a; --text-secondary: #5a6a60; --text-muted: #94a89c;
    --bg: #f5f7f5; --card: #ffffff; --border: rgba(0,0,0,0.08); --border-mid: rgba(0,0,0,0.14);
    --radius: 14px; --radius-sm: 9px;
    --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-primary); }
  #app { display: flex; flex-direction: column; height: 100%; max-width: 430px; margin: 0 auto; }

  /* Topbar */
  .topbar { background: var(--green-dark); color: #fff; padding: calc(var(--safe-top) + 14px) 16px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .topbar-back { background: rgba(255,255,255,0.18); border: none; border-radius: 8px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0; text-decoration: none; }
  .topbar h1 { font-size: 17px; font-weight: 600; flex: 1; }

  /* Content */
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 16px calc(var(--safe-bottom) + 16px); }

  /* Search card */
  .search-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
  .search-card-title { font-size: 13px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }

  /* Mode toggle */
  .mode-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
  .mode-btn { flex: 1; padding: 10px 6px; font-size: 13px; font-weight: 600; border-radius: var(--radius-sm); border: 0.5px solid var(--border-mid); background: var(--bg); color: var(--text-secondary); cursor: pointer; text-align: center; transition: background 0.12s; }
  .mode-btn.active { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }

  /* Location input */
  .location-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .location-input { flex: 1; border: 0.5px solid var(--border-mid); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 15px; color: var(--text-primary); background: var(--bg); outline: none; }
  .location-input:focus { border-color: var(--green-mid); }
  .location-go-btn { background: var(--green-dark); color: #fff; border: none; border-radius: var(--radius-sm); padding: 12px 16px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }

  /* GPS button */
  .gps-btn { width: 100%; padding: 13px; background: var(--green-light); border: 0.5px solid rgba(45,138,82,0.25); border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; color: var(--green-dark); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 14px; }
  .gps-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-mid); flex-shrink: 0; }
  .gps-dot.pulse { animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }

  /* Radius selector */
  .radius-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
  .radius-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 14px; }
  .radius-btn { padding: 10px 4px; font-size: 13px; font-weight: 600; border-radius: var(--radius-sm); border: 0.5px solid var(--border-mid); background: var(--bg); color: var(--text-secondary); cursor: pointer; text-align: center; }
  .radius-btn.active { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }

  /* Filter row */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
  .filter-btn { padding: 7px 11px; font-size: 12px; font-weight: 600; border-radius: 20px; border: 0.5px solid var(--border-mid); background: var(--bg); color: var(--text-secondary); cursor: pointer; }
  .filter-btn.active { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }

  /* Search button */
  .btn-search { width: 100%; padding: 15px; background: var(--green-dark); color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 14px; }
  .btn-search:active { opacity: 0.85; }
  .btn-search:disabled { opacity: 0.4; cursor: default; }

  /* Status bar */
  .status-bar { font-size: 13px; color: var(--text-secondary); text-align: center; padding: 8px 0; min-height: 36px; }

  /* Results */
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .results-count { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

  .course-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: box-shadow 0.15s; }
  .course-card:active { background: var(--green-pale); }
  .course-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .course-dist-badge { background: var(--green-dark); color: #fff; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .course-name { font-size: 15px; font-weight: 700; color: var(--text-primary); flex: 1; line-height: 1.3; }
  .course-suburb { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
  .course-meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .course-tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; border: 0.5px solid var(--border-mid); }
  .tag-public    { background: #e8f5ed; color: #1a6b3a; border-color: rgba(45,138,82,0.2); }
  .tag-semi      { background: #e8f0fb; color: #1a3a6b; border-color: rgba(26,58,107,0.2); }
  .tag-members   { background: #fff8e8; color: #8a6010; border-color: rgba(138,96,16,0.2); }
  .tag-resort    { background: #fce8f5; color: #6b1a5a; border-color: rgba(107,26,90,0.2); }
  .tag-private   { background: #f5e8e8; color: #6b1a1a; border-color: rgba(107,26,26,0.2); }
  .tag-neutral   { background: var(--bg); color: var(--text-muted); }
  .course-notes  { font-size: 12px; color: var(--text-muted); margin-top: 8px; line-height: 1.4; }
  .course-fees   { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

  /* Expanded detail */
  .course-detail { display: none; border-top: 0.5px solid var(--border); margin-top: 10px; padding-top: 10px; }
  .course-card.expanded .course-detail { display: block; }
  .detail-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 0.5px solid rgba(0,0,0,0.05); }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--text-muted); }
  .detail-value { font-weight: 600; color: var(--text-primary); text-align: right; }

  /* Empty state */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; line-height: 1.6; }
  .empty-icon { font-size: 40px; margin-bottom: 10px; display: block; }

  /* Section divider */
  .section-divider { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); padding: 6px 0 8px; border-bottom: 0.5px solid var(--border); margin-bottom: 10px; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <a class="topbar-back" href="index.html" aria-label="Back">&#8592;</a>
    <h1>Find a Course</h1>
  </div>

  <div class="content">
    <div class="search-card">
      <div class="search-card-title">Search by</div>

      <!-- Mode toggle -->
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-gps" onclick="setMode('gps')">&#127757; My location</button>
        <button class="mode-btn" id="mode-town" onclick="setMode('town')">&#128205; Town or suburb</button>
      </div>

      <!-- GPS mode -->
      <div id="gps-section">
        <button class="gps-btn" id="gps-btn" onclick="getMyLocation()">
          <span class="gps-dot" id="gps-dot"></span>
          <span id="gps-btn-label">Use my current location</span>
        </button>
        <div class="status-bar" id="gps-status"></div>
      </div>

      <!-- Town mode -->
      <div id="town-section" style="display:none">
        <div class="location-row">
          <input class="location-input" type="text" id="town-input" placeholder="e.g. Geelong, Ballarat, Frankston…" autocomplete="off">
          <button class="location-go-btn" onclick="searchByTown()">Go</button>
        </div>
        <div class="status-bar" id="town-status"></div>
      </div>

      <!-- Radius -->
      <div class="radius-label">Distance radius</div>
      <div class="radius-grid">
        <button class="radius-btn active" onclick="setRadius(25,this)">25 km</button>
        <button class="radius-btn" onclick="setRadius(50,this)">50 km</button>
        <button class="radius-btn" onclick="setRadius(100,this)">100 km</button>
        <button class="radius-btn" onclick="setRadius(200,this)">200 km</button>
      </div>

      <!-- Access type filter -->
      <div class="radius-label">Access type</div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="toggleFilter(this,'all')">All</button>
        <button class="filter-btn" onclick="toggleFilter(this,'Public')">Public</button>
        <button class="filter-btn" onclick="toggleFilter(this,'Semi-Private')">Semi-Private</button>
        <button class="filter-btn" onclick="toggleFilter(this,'Members – Visitors Welcome')">Members</button>
        <button class="filter-btn" onclick="toggleFilter(this,'Resort / Public')">Resort</button>
      </div>

      <button class="btn-search" id="search-btn" onclick="doSearch()" disabled>Search</button>
    </div>

    <!-- Results -->
    <div id="results-area"></div>
  </div>
</div>

<script>
let searchLat = null, searchLng = null, searchLabel = '';
let selectedRadius = 25;
let selectedAccess = 'all';
let mode = 'gps';

// ── Mode ──────────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('mode-gps').classList.toggle('active', m==='gps');
  document.getElementById('mode-town').classList.toggle('active', m==='town');
  document.getElementById('gps-section').style.display = m==='gps' ? 'block' : 'none';
  document.getElementById('town-section').style.display = m==='town' ? 'block' : 'none';
  searchLat = null; searchLng = null;
  document.getElementById('search-btn').disabled = true;
}

// ── Radius ────────────────────────────────────────────────────────────────────
function setRadius(r, btn) {
  selectedRadius = r;
  document.querySelectorAll('.radius-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Filter ────────────────────────────────────────────────────────────────────
function toggleFilter(btn, val) {
  selectedAccess = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── GPS location ─────────────────────────────────────────────────────────────
function getMyLocation() {
  if (!navigator.geolocation) { setGPSStatus('GPS not available on this device'); return; }
  const dot = document.getElementById('gps-dot');
  const lbl = document.getElementById('gps-btn-label');
  dot.classList.add('pulse');
  lbl.textContent = 'Getting your location…';
  setGPSStatus('Locating you…');
  navigator.geolocation.getCurrentPosition(pos => {
    searchLat = pos.coords.latitude;
    searchLng = pos.coords.longitude;
    searchLabel = 'your location';
    dot.classList.remove('pulse');
    lbl.textContent = '✓ Location found — tap Search';
    setGPSStatus('Position locked (' + searchLat.toFixed(4) + ', ' + searchLng.toFixed(4) + ')');
    document.getElementById('search-btn').disabled = false;
  }, err => {
    dot.classList.remove('pulse');
    lbl.textContent = 'Use my current location';
    setGPSStatus('Could not get location — check location permissions in Settings');
  }, {enableHighAccuracy: true, timeout: 12000});
}

function setGPSStatus(msg) { document.getElementById('gps-status').textContent = msg; }

// ── Town search ───────────────────────────────────────────────────────────────
function searchByTown() {
  const val = document.getElementById('town-input').value.trim();
  if (!val) { document.getElementById('town-status').textContent = 'Please enter a town or suburb'; return; }
  document.getElementById('town-status').textContent = 'Looking up ' + val + '…';

  // First try matching against our known suburb coords in course data
  const match = findSuburbCoords(val);
  if (match) {
    searchLat = match.lat; searchLng = match.lng; searchLabel = val;
    document.getElementById('town-status').textContent = '✓ Found ' + val;
    document.getElementById('search-btn').disabled = false;
    return;
  }

  // Fall back to nominatim geocoding
  const url = 'https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(val + ', Victoria, Australia') + '&format=json&limit=1';
  fetch(url, {headers: {'Accept-Language': 'en', 'User-Agent': 'GolfTrackerApp/1.0'}})
    .then(r => r.json())
    .then(data => {
      if (data && data.length > 0) {
        searchLat = parseFloat(data[0].lat);
        searchLng = parseFloat(data[0].lon);
        searchLabel = val;
        document.getElementById('town-status').textContent = '✓ Found: ' + data[0].display_name.split(',')[0];
        document.getElementById('search-btn').disabled = false;
      } else {
        document.getElementById('town-status').textContent = 'Could not find "' + val + '" — try a nearby larger town';
      }
    })
    .catch(() => {
      document.getElementById('town-status').textContent = 'Search unavailable offline — try a suburb from the course list';
    });
}

function findSuburbCoords(query) {
  const q = query.toLowerCase().trim();
  // Build a unique suburb list from COURSES data
  const found = COURSES.find(c => c.suburb.toLowerCase() === q);
  if (found) return {lat: found.lat, lng: found.lng};
  // Partial match
  const partial = COURSES.find(c => c.suburb.toLowerCase().includes(q) || q.includes(c.suburb.toLowerCase()));
  if (partial) return {lat: partial.lat, lng: partial.lng};
  return null;
}

// Allow enter key in town input
document.getElementById('town-input').addEventListener('keydown', e => { if (e.key==='Enter') searchByTown(); });

// ── Haversine distance ────────────────────────────────────────────────────────
function distKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

// ── Search ────────────────────────────────────────────────────────────────────
function doSearch() {
  if (searchLat===null) { return; }
  const area = document.getElementById('results-area');

  // Filter by distance
  let results = COURSES.map(c => ({
    ...c,
    distKm: distKm(searchLat, searchLng, c.lat, c.lng)
  })).filter(c => c.distKm <= selectedRadius);

  // Filter by access type
  if (selectedAccess !== 'all') {
    results = results.filter(c => c.access === selectedAccess);
  }

  // Sort by distance
  results.sort((a,b) => a.distKm - b.distKm);

  if (results.length === 0) {
    area.innerHTML = '<div class="empty-state"><span class="empty-icon">🔍</span>No courses found within ' + selectedRadius + 'km of ' + searchLabel + '.<br><br>Try increasing the distance radius.</div>';
    return;
  }

  // Group by access type for display
  const accessOrder = ['Public', 'Resort / Public', 'Semi-Private', 'Members – Visitors Welcome', 'Private'];
  const grouped = selectedAccess === 'all';

  let html = '<div class="results-header"><div class="results-count">' + results.length + ' course' + (results.length===1?'':'s') + ' found</div><div style="font-size:12px;color:var(--text-muted)">within ' + selectedRadius + 'km</div></div>';

  if (grouped) {
    accessOrder.forEach(type => {
      const group = results.filter(c => c.access === type);
      if (group.length === 0) return;
      html += '<div class="section-divider">' + type + ' (' + group.length + ')</div>';
      html += group.map(c => courseCard(c)).join('');
    });
    // Any uncategorised
    const other = results.filter(c => !accessOrder.includes(c.access));
    if (other.length) {
      html += '<div class="section-divider">Other (' + other.length + ')</div>';
      html += other.map(c => courseCard(c)).join('');
    }
  } else {
    html += results.map(c => courseCard(c)).join('');
  }

  area.innerHTML = html;
}

// ── Course card ───────────────────────────────────────────────────────────────
function courseCard(c) {
  const dist = c.distKm < 1 ? Math.round(c.distKm*1000)+'m' : Math.round(c.distKm)+'km';
  const tagClass = {
    'Public': 'tag-public', 'Semi-Private': 'tag-semi',
    'Members – Visitors Welcome': 'tag-members', 'Resort / Public': 'tag-resort',
    'Private': 'tag-private'
  }[c.access] || 'tag-neutral';

  const fee = c.holes === 9
    ? (c.fee9 && c.fee9 !== 'N/A' ? c.fee9 : null)
    : (c.fee18 && c.fee18 !== 'N/A' && !c.fee18.includes('Private') ? c.fee18 : null);

  return '<div class="course-card" onclick="toggleCard(this)">' +
    '<div class="course-top">' +
      '<div class="course-dist-badge">' + dist + '</div>' +
      '<div class="course-name">' + c.name + '</div>' +
    '</div>' +
    '<div class="course-suburb">&#128205; ' + c.suburb + '</div>' +
    '<div class="course-meta">' +
      '<span class="course-tag ' + tagClass + '">' + c.access + '</span>' +
      '<span class="course-tag tag-neutral">' + c.holes + ' holes</span>' +
      '<span class="course-tag tag-neutral">Par ' + c.par + '</span>' +
      (fee ? '<span class="course-tag tag-neutral">' + fee + '</span>' : '') +
    '</div>' +
    (c.notes ? '<div class="course-notes">' + c.notes + '</div>' : '') +
    '</div>';
}

function toggleCard(card) {
  card.classList.toggle('expanded');
}

// Allow enter to trigger search if ready
document.addEventListener('keydown', e => {
  if (e.key==='Enter' && searchLat!==null) doSearch();
});
</script>
</body>
</html>

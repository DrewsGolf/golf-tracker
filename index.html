<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shot Tracker">
<meta name="theme-color" content="#0D0D0D">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>Shot Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg-primary:   #0D0D0D;
    --gold:         #C8A96A;
    --safe-top:     env(safe-area-inset-top, 0px);
    --safe-bottom:  env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    overflow: hidden;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 430px;
    margin: 0 auto;
    overflow: hidden;
  }

  /* ── Full screen hero ───────────────────────────────────────── */
  .hero {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 15%;
    display: block;
  }

  /* ── Settings button — top left, same size as nav icons ─────── */
  .settings-btn {
    position: absolute;
    top: calc(var(--safe-top) + 12px);
    left: 16px;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 50;
    text-decoration: none;
  }

  .settings-btn img {
    width: 56px;
    height: 56px;
    object-fit: contain;
    display: block;
  }

  .settings-btn:active { opacity: 0.7; }

  /* ── Bottom nav shell ───────────────────────────────────────── */
  .nav-shell {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    /* Shell starts at natural height (primary row only) */
  }

  /* Nav rows share the same base styles */
  .nav-row {
    display: flex;
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  /* Primary row — always visible, slides up when drawer opens */
  .nav-primary {
    border-top: 0.5px solid rgba(200,169,106,0.2);
    padding-bottom: calc(var(--safe-bottom) + 6px);
    transform: translateY(0);
    transition: transform 350ms cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
    position: relative;
    z-index: 2;
  }

  .nav-primary.raised {
    transform: translateY(-100%);
  }

  /* Secondary row — hidden below, slides up under primary */
  .nav-secondary {
    border-top: 0.5px solid rgba(200,169,106,0.12);
    padding-bottom: calc(var(--safe-bottom) + 6px);
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    transform: translateY(100%);
    transition: transform 350ms cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
    z-index: 1;
  }

  .nav-secondary.open {
    transform: translateY(0);
  }

  /* Nav items */
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 4px 6px;
    cursor: pointer;
    text-decoration: none;
    background: none;
    border: none;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }

  .nav-item:active { opacity: 0.7; }

  .nav-item img {
    width: 56px;
    height: 56px;
    object-fit: contain;
    display: block;
  }

  /* Overlay — dims hero when drawer is open */
  .nav-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 350ms ease;
    z-index: 90;
  }

  .nav-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
</style>
</head>
<body>
<div class="app">

  <!-- Full screen hero image -->
  <div class="hero">
    <img class="hero-img" src="Background_with_logo_and_tag.png" alt="">
  </div>

  <!-- Settings — top left, same size as nav icons -->
  <a class="settings-btn" href="settings.html">
    <img src="Settings_1.png" alt="Settings">
  </a>

  <!-- Overlay (dims when drawer open) -->
  <div class="nav-overlay" id="nav-overlay" onclick="closeDrawer()"></div>

  <!-- Nav shell -->
  <div class="nav-shell" id="nav-shell">

    <!-- Primary row — slides UP when drawer opens, More becomes Courses -->
    <div class="nav-row nav-primary" id="nav-primary">
      <a class="nav-item" href="index.html">
        <img src="Home_1.png" alt="Home">
      </a>
      <a class="nav-item" href="start.html" id="nav-play">
        <img src="Play_2.png" alt="Play">
      </a>
      <a class="nav-item" href="range.html">
        <img src="Range_2.png" alt="Range">
      </a>
      <button class="nav-item" id="btn-more" onclick="openDrawer()">
        <img src="More.png" alt="More" id="icon-more">
      </button>
    </div>

    <!-- Secondary row — slides up UNDERNEATH primary when drawer opens -->
    <div class="nav-row nav-secondary" id="nav-secondary">
      <a class="nav-item" href="history.html">
        <img src="History_2.png" alt="History">
      </a>
      <a class="nav-item" href="clubs.html">
        <img src="Clubs_2.png" alt="Clubs">
      </a>
      <a class="nav-item" href="suggest.html">
        <img src="Suggets_2.png" alt="Suggest">
      </a>
      <button class="nav-item" onclick="closeDrawer()">
        <img src="Back.png" alt="Back">
      </button>
    </div>

  </div>

</div>

<script>
// ── Drawer ────────────────────────────────────────────────────────────────────
const primary   = document.getElementById('nav-primary');
const secondary = document.getElementById('nav-secondary');
const overlay   = document.getElementById('nav-overlay');
const btnMore   = document.getElementById('btn-more');
const iconMore  = document.getElementById('icon-more');

function openDrawer() {
  // Primary slides up
  primary.classList.add('raised');
  // Secondary slides up underneath
  secondary.classList.add('open');
  overlay.classList.add('open');
  // More becomes Courses
  iconMore.src = 'Courses_2.png';
  iconMore.alt = 'Courses';
  btnMore.onclick = () => window.location.href = 'find.html';
}

function closeDrawer() {
  primary.classList.remove('raised');
  secondary.classList.remove('open');
  overlay.classList.remove('open');
  iconMore.src = 'More.png';
  iconMore.alt = 'More';
  btnMore.onclick = openDrawer;
}

// ── Continue round — swap Play to round.html if in progress ──────────────────
const shots = JSON.parse(localStorage.getItem('golf-shots-v3') || '[]');
const currentCourse = JSON.parse(localStorage.getItem('golf-current-course') || 'null');
if (shots.length > 0 || currentCourse) {
  document.getElementById('nav-play').setAttribute('href', 'round.html');
}

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(()=>{}); }
</script>
</body>
</html>

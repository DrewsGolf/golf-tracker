<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D0D">
<link rel="manifest" href="manifest.json">
<title>Driving Range — Shot Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg-primary: #0D0D0D; --bg-card: #1C1C1C;
    --gold: #C8A96A; --gold-muted: #9A7C47;
    --text-primary: #F2F2F2; --text-secondary: #BDBDBD; --text-muted: #7A7A7A;
    --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { height: 100%; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); }
  .page { display: flex; flex-direction: column; min-height: 100%; max-width: 430px; margin: 0 auto; }

  /* Header */
  .header { padding: calc(var(--safe-top) + 20px) 24px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 0.5px solid rgba(200,169,106,0.12); }
  .header-logo { height: 32px; object-fit: contain; }
  .header-title { font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }

  /* Content */
  .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 32px calc(var(--safe-bottom) + 90px); text-align: center; gap: 20px; }
  .placeholder-icon { width: 100px; height: 100px; object-fit: contain; opacity: 0.6; }
  .placeholder-title { font-size: 22px; font-weight: 300; color: var(--text-primary); letter-spacing: 0.02em; }
  .placeholder-divider { width: 32px; height: 1px; background: var(--gold); opacity: 0.6; }
  .placeholder-desc { font-size: 13px; color: var(--text-muted); line-height: 1.7; letter-spacing: 0.02em; max-width: 280px; }
  .placeholder-pill { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold-muted); border: 0.5px solid rgba(200,169,106,0.3); border-radius: 20px; padding: 6px 16px; }

  /* Bottom nav */
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(13,13,13,0.95); border-top: 0.5px solid rgba(200,169,106,0.2); padding: 10px 0 calc(var(--safe-bottom) + 6px); display: flex; z-index: 100; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px 4px; text-decoration: none; background: none; border: none; cursor: pointer; }
  .nav-item img { width: 56px; height: 56px; object-fit: contain; }
  .nav-item:active { opacity: 0.7; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <img class="header-logo" src="Logo.png" alt="Shot Tracker">
    <div class="header-title">Driving Range</div>
  </div>

  <div class="content">
    <img class="placeholder-icon" src="Range_2.png" alt="Range">
    <div class="placeholder-title">Driving Range</div>
    <div class="placeholder-divider"></div>
    <div class="placeholder-desc">Track your range sessions, measure distances and monitor your practice performance.</div>
    <div class="placeholder-pill">Coming Soon</div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="index.html"><img src="Home_1.png" alt="Home"></a>
    <a class="nav-item" href="start.html"><img src="Play_1.png" alt="Play"></a>
    <a class="nav-item" href="range.html"><img src="Range_2.png" alt="Range"></a>
    <a class="nav-item" href="index.html"><img src="More_1.png" alt="More"></a>
  </nav>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shot Tracker">
<meta name="theme-color" content="#0D0D0D">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>Shot Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg-primary:   #0D0D0D;
    --bg-secondary: #151515;
    --bg-card:      #1C1C1C;
    --gold:         #C8A96A;
    --gold-hi:      #D9B878;
    --gold-muted:   #9A7C47;
    --text-primary: #F2F2F2;
    --text-secondary: #BDBDBD;
    --text-muted:   #7A7A7A;
    --success:      #758B69;
    --warning:      #D8A04B;
    --error:        #8E4B4B;
    --radius:       20px;
    --radius-sm:    12px;
    --safe-top:     env(safe-area-inset-top, 0px);
    --safe-bottom:  env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow-x: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    min-height: 100%;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
  }

  /* ── Hero ───────────────────────────────────────────────────── */
  .hero {
    position: relative;
    height: 100vh;
    width: 100%;
    overflow: hidden;
    flex-shrink: 0;
  }

  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 15%;
  }

  /* No overlay — image has its own natural dark fade at the bottom */

  .hero-content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 28px 28px;
  }

  .hero-eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .hero-title {
    font-size: 34px;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 14px;
  }

  .hero-divider {
    width: 32px;
    height: 1px;
    background: var(--gold);
    margin-bottom: 14px;
    opacity: 0.8;
  }

  .hero-sub {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  /* ── Bottom nav ─────────────────────────────────────────────── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--bg-secondary);
    border-top: 0.5px solid rgba(200,169,106,0.12);
    padding: 10px 0 calc(var(--safe-bottom) + 10px);
    display: flex;
    z-index: 100;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-decoration: none;
    padding: 6px 0;
    cursor: pointer;
    background: none;
    border: none;
    position: relative;
  }

  .nav-icon {
    font-size: 20px;
    line-height: 1;
    transition: color 0.2s;
  }

  .nav-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s;
    color: var(--text-muted);
  }

  .nav-item.active .nav-label { color: var(--gold); }

  /* Gold underline on active tab */
  .nav-item.active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 1.5px;
    background: var(--gold);
    border-radius: 1px;
  }

</style>
</head>
<body>
<div class="app">

  <!-- Hero -->
  <div class="hero">
    <img class="hero-img" src="Background_with_logo_and_tag.png" alt="">
    <!-- Logo and title are part of the image itself -->
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-item active" href="index.html">
      <span class="nav-icon">⌂</span>
      <span class="nav-label">Home</span>
    </a>
    <a class="nav-item" href="start.html" id="nav-play">
      <span class="nav-icon">⛳</span>
      <span class="nav-label">Play</span>
    </a>
    <a class="nav-item" href="history.html">
      <span class="nav-icon">◎</span>
      <span class="nav-label">History</span>
    </a>
    <a class="nav-item" href="find.html">
      <span class="nav-icon">◈</span>
      <span class="nav-label">Courses</span>
    </a>
    <a class="nav-item" href="clubs.html">
      <span class="nav-icon">◐</span>
      <span class="nav-label">Clubs</span>
    </a>
  </nav>

</div>

<script>
// ── Active round — swap nav Play tab to round.html if in progress ─────────────
const shots = JSON.parse(localStorage.getItem('golf-shots-v3') || '[]');
const currentCourse = JSON.parse(localStorage.getItem('golf-current-course') || 'null');

if (shots.length > 0 || currentCourse) {
  document.getElementById('nav-play').setAttribute('href', 'round.html');
}

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(()=>{}); }
</script>
</body>
</html>
